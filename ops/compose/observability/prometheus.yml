global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['platformops-obs-prometheus:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['platformops-obs-node-exporter:9100']

  - job_name: 'process_exporter'
    static_configs:
      - targets: ['platformops-obs-process-exporter:9256']
