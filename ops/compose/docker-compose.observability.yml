version: '3.9'

services:
  platformops-obs-loki:
    image: grafana/loki:3.2.1
    container_name: platformops-obs-loki
    command: -config.file=/etc/loki/config.yaml
    ports:
      - "9021:3100"
    volumes:
      - /home/ubuntu/PlatformOps/ops/compose/observability/loki-config.yaml:/etc/loki/config.yaml:ro
      - /home/ubuntu/PlatformOps/data/observability/loki:/loki
    networks:
      compose_platformops_prod_network:
        ipv4_address: 180.80.0.50
    restart: unless-stopped

  platformops-obs-alloy:
    image: grafana/alloy:v1.5.1
    container_name: platformops-obs-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "12346:12345"
    volumes:
      - /home/ubuntu/PlatformOps/ops/compose/observability/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/ubuntu/PlatformOps/data/observability/alloy:/var/lib/alloy
    networks:
      compose_platformops_prod_network:
        ipv4_address: 180.80.0.51
    depends_on:
      - platformops-obs-loki
    restart: unless-stopped

  platformops-obs-prometheus:
    image: prom/prometheus:v2.52.0
    container_name: platformops-obs-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9022:9090"
    volumes:
      - /home/ubuntu/PlatformOps/ops/compose/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      compose_platformops_prod_network:
        ipv4_address: 180.80.0.52
    restart: unless-stopped

  platformops-obs-node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: platformops-obs-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      compose_platformops_prod_network:
        ipv4_address: 180.80.0.53
    restart: unless-stopped

  platformops-obs-process-exporter:
    image: platformops/process-exporter:latest
    container_name: platformops-obs-process-exporter
    privileged: true
    ports:
      - "9257:9256"
    volumes:
      - /proc:/host/proc:ro
    networks:
      compose_platformops_prod_network:
        ipv4_address: 180.80.0.54
    restart: unless-stopped

  platformops-obs-glitchtip-postgres:
    image: postgres:16
    container_name: platformops-obs-glitchtip-postgres
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: change-me
    volumes:
      - /home/ubuntu/PlatformOps/data/observability/glitchtip/postgres:/var/lib/postgresql/data
    networks:
      compose_platformops_prod_network:
        ipv4_address: 180.80.0.55
    restart: unless-stopped

  platformops-obs-glitchtip-valkey:
    image: valkey/valkey:7.2
    container_name: platformops-obs-glitchtip-valkey
    command: valkey-server --save 60 1000 --appendonly yes
    volumes:
      - /home/ubuntu/PlatformOps/data/observability/glitchtip/valkey:/data
    networks:
      compose_platformops_prod_network:
        ipv4_address: 180.80.0.56
    restart: unless-stopped

  platformops-obs-glitchtip-migrate:
    image: iktaraai/services:glitchtip-iktara-6.1.9
    container_name: platformops-obs-glitchtip-migrate
    env_file:
      - /home/ubuntu/PlatformOps/ops/compose/observability/glitchtip.env
    environment:
      DATABASE_URL: postgresql://glitchtip:change-me@180.80.0.55:5432/glitchtip
      REDIS_URL: redis://180.80.0.56:6379/0
    depends_on:
      - platformops-obs-glitchtip-postgres
      - platformops-obs-glitchtip-valkey
    networks:
      compose_platformops_prod_network:
        ipv4_address: 180.80.0.57
    command: ./manage.py migrate
    restart: "no"

  platformops-obs-glitchtip-web:
    image: iktaraai/services:glitchtip-iktara-6.1.9
    container_name: platformops-obs-glitchtip-web
    user: root
    env_file:
      - /home/ubuntu/PlatformOps/ops/compose/observability/glitchtip.env
    environment:
      DATABASE_URL: postgresql://glitchtip:change-me@180.80.0.55:5432/glitchtip
      REDIS_URL: redis://180.80.0.56:6379/0
    depends_on:
      - platformops-obs-glitchtip-postgres
      - platformops-obs-glitchtip-valkey
    ports:
      - "9008:8000"
    volumes:
      - /home/ubuntu/PlatformOps/ops/compose/observability/patch_glitchtip_schema.py:/tmp/patch_glitchtip_schema.py:ro
      - /home/ubuntu/PlatformOps/ops/compose/observability/glitchtip_runtime_map.yaml:/tmp/glitchtip_runtime_map.yaml:ro
    command: sh -lc "python /tmp/patch_glitchtip_schema.py && ./bin/start.sh"
    networks:
      compose_platformops_prod_network:
        ipv4_address: 180.80.0.58
    restart: unless-stopped

  platformops-obs-glitchtip-worker:
    image: iktaraai/services:glitchtip-iktara-6.1.9
    container_name: platformops-obs-glitchtip-worker
    user: root
    env_file:
      - /home/ubuntu/PlatformOps/ops/compose/observability/glitchtip.env
    environment:
      DATABASE_URL: postgresql://glitchtip:change-me@180.80.0.55:5432/glitchtip
      REDIS_URL: redis://180.80.0.56:6379/0
      SERVER_ROLE: worker
    depends_on:
      - platformops-obs-glitchtip-postgres
      - platformops-obs-glitchtip-valkey
    volumes:
      - /home/ubuntu/PlatformOps/ops/compose/observability/patch_glitchtip_schema.py:/tmp/patch_glitchtip_schema.py:ro
      - /home/ubuntu/PlatformOps/ops/compose/observability/glitchtip_runtime_map.yaml:/tmp/glitchtip_runtime_map.yaml:ro
    command: sh -lc "python /tmp/patch_glitchtip_schema.py && ./bin/start.sh"
    networks:
      compose_platformops_prod_network:
        ipv4_address: 180.80.0.59
    restart: unless-stopped

networks:
  compose_platformops_prod_network:
    external: true
