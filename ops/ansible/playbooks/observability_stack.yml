---
- name: Deploy lightweight observability stack
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Ensure observability network
      community.docker.docker_network:
        name: "{{ docker_network | default('platformops-net') }}"
        state: present

    - name: Run Prometheus
      community.docker.docker_container:
        name: platformops-prometheus
        image: prom/prometheus:v2.52.0
        state: started
        restart_policy: unless-stopped
        published_ports:
          - "9090:9090"
        volumes:
          - "{{ project_root }}/ops/docker/configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
        networks:
          - name: "{{ docker_network | default('platformops-net') }}"

    - name: Run Loki
      community.docker.docker_container:
        name: platformops-loki
        image: grafana/loki:2.9.8
        state: started
        restart_policy: unless-stopped
        published_ports:
          - "3100:3100"
        volumes:
          - "{{ project_root }}/ops/docker/configs/loki.yml:/etc/loki/local-config.yaml:ro"
        command: "-config.file=/etc/loki/local-config.yaml"
        networks:
          - name: "{{ docker_network | default('platformops-net') }}"
